<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Marina Kamel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        header {
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { margin: 0; color: var(--primary); font-size: 2.5rem; }
        h2 { color: var(--primary); border-left: 4px solid var(--primary); padding-left: 10px; margin-top: 30px; }
        
        .intro { font-style: italic; color: var(--secondary); font-size: 1.1rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        .tech-tag {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.8rem;
            margin: 3px;
        }

        .contact-info {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="name">Chargement...</h1>
            <p class="intro" id="title-location"></p>
            <p id="description"></p>
        </header>

        <section>
            <h2>🛠️ Compétences</h2>
            <div id="skills-container"></div>
        </section>

        <section>
            <h2>📂 Projets</h2>
            <div id="projects-grid" class="grid"></div>
        </section>

        <section>
            <h2>🎓 Formations</h2>
            <div id="formations-list"></div>
        </section>

        <footer class="contact-info">
            <p><strong>Contact :</strong> <span id="email"></span> | <span id="tel"></span></p>
            <p><a id="linkedin" target="_blank">LinkedIn</a> | <a id="github" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script>
        async function loadCV() {
            try {
                const response = await fetch('/api/cv');
                const data = await response.json();

                // Header
                document.getElementById('name').textContent = data.header.name;
                document.getElementById('title-location').textContent = `${data.header.title} | ${data.header.location}`;
                document.getElementById('description').textContent = data.about.description;

                // Compétences (Affiche les catégories principales)
                const skillsContainer = document.getElementById('skills-container');
                for (const [category, skills] of Object.entries(data.competences)) {
                    if (Array.isArray(skills)) {
                        const p = document.createElement('p');
                        p.innerHTML = `<strong>${category} :</strong> `;
                        skills.forEach(s => {
                            const name = typeof s === 'string' ? s : s.nom;
                            p.innerHTML += `<span class="tech-tag">${name}</span>`;
                        });
                        skillsContainer.appendChild(p);
                    }
                }

                // Projets
                const projectsGrid = document.getElementById('projects-grid');
                data.projets.forEach(proj => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>${proj.titre}</h3>
                        <p>${proj.description}</p>
                        <div>${proj.technologies.map(t => `<span class="tech-tag">${t}</span>`).join('')}</div>
                        <br><a href="${proj.lien}" target="_blank">Voir le projet →</a>
                    `;
                    projectsGrid.appendChild(card);
                });

                // Formations
                const formationsList = document.getElementById('formations-list');
                data.formations.forEach(f => {
                    const div = document.createElement('div');
                    div.innerHTML = `<p><strong>${f.titre}</strong> - ${f.ecole} (${f.date})</p>`;
                    formationsList.appendChild(div);
                });

                // Contact
                document.getElementById('email').textContent = data.contact.email;
                document.getElementById('tel').textContent = data.contact.tel;
                document.getElementById('linkedin').href = data.contact.linkedin;
                document.getElementById('github').href = data.contact.github;

            } catch (error) {
                console.error("Erreur lors du chargement des données :", error);
            }
        }

        loadCV();
    </script>
</body>
</html>
